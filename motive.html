<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motive AI Platform — Product Vision</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #F97316;
    --orange-dark: #EA6A0A;
    --orange-light: #FED7AA;
    --orange-glow: rgba(249,115,22,0.15);
    --bg-dark: #0A0C10;
    --bg-card: #111318;
    --bg-card2: #161A22;
    --bg-glass: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --border-orange: rgba(249,115,22,0.3);
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #475569;
    --green: #22C55E;
    --blue: #3B82F6;
    --purple: #A855F7;
    --yellow: #EAB308;
    --red: #EF4444;
    --teal: #14B8A6;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 1.25rem;
    letter-spacing: -0.02em;
  }

  .nav-logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text-primary); }

  .nav-badge {
    background: var(--orange-glow);
    border: 1px solid var(--border-orange);
    color: var(--orange);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 100px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .nav-cta {
    background: var(--orange);
    color: #fff;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s, transform 0.1s;
  }

  .nav-cta:hover { background: var(--orange-dark); transform: translateY(-1px); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 2rem 80px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--orange-glow);
    border: 1px solid var(--border-orange);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--orange);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .hero h1 {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.04em;
    max-width: 900px;
    margin-bottom: 1.5rem;
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--orange) 0%, #FBBF24 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: 1.125rem;
    color: var(--text-secondary);
    max-width: 620px;
    margin-bottom: 2.5rem;
    line-height: 1.7;
  }

  .hero-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 4rem;
  }

  .btn-primary {
    background: var(--orange);
    color: #fff;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
  }

  .btn-primary:hover { background: var(--orange-dark); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(249,115,22,0.35); }

  .btn-secondary {
    background: var(--bg-glass);
    color: var(--text-primary);
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    transition: all 0.2s;
    cursor: pointer;
  }

  .btn-secondary:hover { border-color: var(--border-orange); background: var(--orange-glow); }

  /* ── HERO STATS BAR ── */
  .hero-stats {
    display: flex;
    gap: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    width: 100%;
    max-width: 800px;
  }

  .hero-stat {
    flex: 1;
    padding: 1.25rem 1.5rem;
    border-right: 1px solid var(--border);
    text-align: left;
  }

  .hero-stat:last-child { border-right: none; }

  .hero-stat-value {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .hero-stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ── SECTION STYLES ── */
  section { padding: 80px 2rem; }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 1rem;
  }

  .section-title {
    font-size: clamp(1.75rem, 3.5vw, 2.75rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 1rem;
  }

  .section-sub {
    font-size: 1rem;
    color: var(--text-secondary);
    max-width: 560px;
    line-height: 1.7;
  }

  /* ── VERTICAL AI FACTORY (BET 1) ── */
  .bet1 {
    background: linear-gradient(180deg, var(--bg-dark) 0%, rgba(17,19,24,0.5) 100%);
  }

  .bet1-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: start;
    margin-top: 3rem;
  }

  .vertical-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .vertical-card:hover {
    border-color: var(--border-orange);
    transform: translateY(-2px);
  }

  .vertical-card.active {
    border-color: var(--orange);
    background: linear-gradient(135deg, rgba(249,115,22,0.05), var(--bg-card));
  }

  .vc-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .vc-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .vc-icon.construction { background: rgba(234,179,8,0.15); }
  .vc-icon.waste { background: rgba(34,197,94,0.15); }
  .vc-icon.field { background: rgba(59,130,246,0.15); }

  .vc-title { font-weight: 700; font-size: 1rem; }
  .vc-sub { font-size: 0.8rem; color: var(--text-muted); }

  .vc-metrics {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .vc-metric {
    flex: 1;
    background: var(--bg-card2);
    border-radius: 8px;
    padding: 0.75rem;
  }

  .vc-metric-val {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .vc-metric-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .vc-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--bg-card2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .tag.green { background: rgba(34,197,94,0.1); color: var(--green); border-color: rgba(34,197,94,0.2); }
  .tag.orange { background: rgba(249,115,22,0.1); color: var(--orange); border-color: rgba(249,115,22,0.2); }
  .tag.blue { background: rgba(59,130,246,0.1); color: var(--blue); border-color: rgba(59,130,246,0.2); }

  /* Scoring Framework */
  .scoring-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
  }

  .scoring-title {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scoring-row {
    margin-bottom: 1rem;
  }

  .scoring-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .scoring-bar-track {
    height: 8px;
    background: var(--bg-card2);
    border-radius: 100px;
    overflow: hidden;
  }

  .scoring-bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 1s ease;
  }

  .pipeline-list { margin-top: 1.5rem; }

  .pipeline-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }

  .pipeline-item:last-child { border-bottom: none; }

  .pipeline-stage {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    min-width: 90px;
    text-align: center;
  }

  .stage-discovery { background: rgba(168,85,247,0.15); color: var(--purple); }
  .stage-prototype { background: rgba(59,130,246,0.15); color: var(--blue); }
  .stage-beta { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .stage-launch { background: rgba(34,197,94,0.15); color: var(--green); }

  /* ── LAST MILE AI (BET 2) ── */
  .bet2 { background: var(--bg-dark); }

  .bet2-layout {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 3rem;
    align-items: start;
    margin-top: 3rem;
  }

  /* Dashboard Mock */
  .dashboard-mock {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .dash-topbar {
    background: var(--bg-card2);
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-red { background: #EF4444; }
  .dot-yellow { background: #EAB308; }
  .dot-green { background: #22C55E; }

  .dash-title-bar {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
  }

  .dash-body { padding: 1.25rem; }

  .ai-event-card {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.2s;
  }

  .ai-event-card:hover { border-color: var(--border-orange); }

  .ai-event-card.high-conf { border-left: 3px solid var(--green); }
  .ai-event-card.med-conf { border-left: 3px solid var(--yellow); }
  .ai-event-card.low-conf { border-left: 3px solid var(--red); }

  .event-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .event-body { flex: 1; }

  .event-title {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .event-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .confidence-bar {
    height: 4px;
    background: var(--bg-card2);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .conf-fill { height: 100%; border-radius: 100px; }

  .conf-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .event-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .evt-btn {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .evt-btn:hover { opacity: 0.8; }
  .evt-btn-review { background: var(--orange); color: #fff; }
  .evt-btn-dismiss { background: var(--bg-card2); color: var(--text-secondary); }

  /* Accuracy Chart */
  .accuracy-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }

  .chart-title {
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .chart-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }

  .metric-row:last-child { border-bottom: none; }

  .metric-name { color: var(--text-secondary); font-weight: 500; }

  .metric-values {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .mv-current { font-weight: 700; font-size: 0.95rem; }
  .mv-delta {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .delta-up { background: rgba(34,197,94,0.15); color: var(--green); }
  .delta-down { background: rgba(239,68,68,0.15); color: var(--red); }

  /* Mini spark line */
  .sparkline-container { margin-top: 1.5rem; }

  .spark-svg { width: 100%; height: 60px; }

  /* Threshold callout */
  .threshold-callout {
    background: rgba(249,115,22,0.08);
    border: 1px solid var(--border-orange);
    border-radius: 10px;
    padding: 1rem;
    margin-top: 1.25rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .threshold-callout strong { color: var(--orange); }

  /* ── GTM PLAYBOOK (BET 3) ── */
  .bet3 { background: linear-gradient(180deg, var(--bg-dark) 0%, rgba(17,19,24,0.3) 100%); }

  .bet3-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .gtm-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    transition: all 0.2s;
  }

  .gtm-card:hover { border-color: var(--border-orange); transform: translateY(-2px); }

  .gtm-step {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--orange);
    margin-bottom: 0.75rem;
  }

  .gtm-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    display: block;
  }

  .gtm-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }

  .gtm-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; }

  .gtm-metric {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .gtm-metric-val { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
  .gtm-metric-label { font-size: 0.7rem; color: var(--text-muted); }

  /* ROI Calculator */
  .roi-section {
    margin-top: 3rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }

  .roi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }

  .roi-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
  .roi-sub { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }

  .roi-input-row {
    margin-bottom: 1rem;
  }

  .roi-label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
  }

  .roi-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 100px;
    background: var(--bg-dark);
    outline: none;
    cursor: pointer;
  }

  .roi-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--orange);
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(249,115,22,0.2);
  }

  .roi-value {
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--orange);
    float: right;
    font-weight: 600;
  }

  .roi-output {
    background: var(--bg-dark);
    border-radius: 12px;
    padding: 1.5rem;
  }

  .roi-output-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }

  .roi-output-big {
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--green);
    margin-bottom: 0.25rem;
  }

  .roi-output-label { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.5rem; }

  .roi-breakdown { }

  .roi-breakdown-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .roi-breakdown-row:last-child { border-bottom: none; }
  .roi-breakdown-row strong { color: var(--text-primary); }

  /* ── METRICS / OUTCOMES ── */
  .outcomes { background: var(--bg-dark); }

  .outcomes-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .outcomes-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
    margin-bottom: 3rem;
  }

  .outcome-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .outcome-card:hover { transform: translateY(-3px); }

  .outcome-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .outcome-card.orange::before { background: var(--orange); }
  .outcome-card.green::before { background: var(--green); }
  .outcome-card.blue::before { background: var(--blue); }
  .outcome-card.purple::before { background: var(--purple); }

  .outcome-val {
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 8px;
  }

  .outcome-val.orange { color: var(--orange); }
  .outcome-val.green { color: var(--green); }
  .outcome-val.blue { color: var(--blue); }
  .outcome-val.purple { color: var(--purple); }

  .outcome-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .outcome-timeline {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Timeline */
  .timeline {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }

  .tl-title { font-size: 1rem; font-weight: 700; margin-bottom: 1.5rem; }

  .tl-row {
    display: flex;
    gap: 0;
    position: relative;
  }
